model:
  target: Models.interpretable_diffusion.gaussian_diffusion.Diffusion_TS
  params:
    seq_length: 24
    feature_size: 22
    n_layer_enc: 4
    n_layer_dec: 4
    d_model: 96
    timesteps: 1000
    sampling_timesteps: 1000
    loss_type: 'l1'
    beta_schedule: 'cosine'
    n_heads: 4
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.0
    kernel_size: 5
    padding_size: 0

solver:
  base_lr: 1.0e-5
  max_epochs: 200  # smoke: ~minutes, not hours
  results_folder: ./Checkpoints_simglucose_3m_smoke
  gradient_accumulate_every: 2
  save_cycle: 100
  ema:
    decay: 0.995
    update_interval: 10

  scheduler:
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 3000
      min_lr: 1.0e-5
      threshold: 1.0e-1
      threshold_mode: rel
      warmup_lr: 8.0e-4
      warmup: 50
      verbose: False

dataloader:
  train_dataset:
    target: Utils.Data_utils.real_datasets.Simglucose3MDataset
    params:
      name: simglucose
      proportion: 1.0
      data_root: ./Data/datasets/simglucose
      window: 24
      save2npy: True
      neg_one_to_one: True
      seed: 123
      period: train

  test_dataset:
    target: Utils.Data_utils.real_datasets.Simglucose3MDataset
    params:
      name: simglucose
      proportion: 0.9
      data_root: ./Data/datasets/simglucose
      window: 24
      save2npy: True
      neg_one_to_one: True
      seed: 123
      period: test
      style: separate
      distribution: geometric
    coefficient: 1.0e-2
    step_size: 5.0e-2
    sampling_steps: 250

  batch_size: 64
  sample_size: 256
  shuffle: True
